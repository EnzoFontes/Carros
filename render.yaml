services:
  - type: web
    name: objeto-backend
    env: python
    buildCommand: bash ./build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
    autoDeploy: true
    rootDir: .
