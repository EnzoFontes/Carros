services:
  - type: web
    name: objeto-backend
    env: python
    buildCommand: |
      cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
    autoDeploy: true
    rootDir: .